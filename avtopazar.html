<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <title>Avto Pazar - Комплетен</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; padding: 20px; background-color: #f9f9f9; }
        header { border-bottom: 1px solid #ddd; padding-bottom: 20px; margin-bottom: 30px; }
        .logo-img { width: 300px; display: block; margin-bottom: 10px; }
        
        /* Админ панел стил */
        #admin-panel { display: none; border: 2px dashed #ff4500; padding: 20px; background: #fff; margin-bottom: 30px; }
        input { margin: 5px; padding: 10px; width: 220px; }
        button { background:#ff4500; border:none; padding:10px 20px; color:white; cursor:pointer; font-weight:bold; }

        #oglasi-lista { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .card { background: #fff; border: 1px solid #ddd; padding: 15px; }
        .card img { width: 100%; height: 160px; object-fit: cover; margin-bottom: 10px; }
    </style>
</head>
<body>

    <header>
        <img src="Gemini_Generated_Image_xwunxmxwunxmxwun.png" class="logo-img" alt="AVTO PAZAR">
        <div id="admin-trigger" style="font-size: 10px; color: #ccc;">(Ctrl+Enter за админ)</div>
    </header>

    <div id="admin-panel">
        <h3>АДМИН - Додади оглас</h3>
        <input type="text" id="naslov" placeholder="Наслов">
        <input type="text" id="cena" placeholder="Цена">
        <input type="text" id="slikaUrl" placeholder="Линк од слика">
        <button onclick="dodadiOglas()">Додади оглас</button>
    </div>

    <div id="oglasi-lista"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA5HhfVOsOMUCCNF7wNI4MlVrJD0BFtxMU",
            authDomain: "avtopazar-1d78e.firebaseapp.com",
            databaseURL: "https://avtopazar-1d78e-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "avtopazar-1d78e",
            storageBucket: "avtopazar-1d78e.firebasestorage.app",
            messagingSenderId: "105094237903",
            appId: "1:105094237903:web:02287d90b7e3c0ebc431ba"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Функција за отворање админ
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                let p = prompt("Лозинка:");
                if (p === "avtopazar55/") document.getElementById('admin-panel').style.display = "block";
            }
        });

        // Функција за додавање
        window.dodadiOglas = () => {
            const naslov = document.getElementById('naslov').value;
            const cena = document.getElementById('cena').value;
            const slika = document.getElementById('slikaUrl').value;
            push(ref(db, 'oglasi'), { naslov, cena, slika });
            alert("Огласот е додаден!");
        };

        // Прикажување
        onValue(ref(db, 'oglasi'), (snapshot) => {
            const container = document.getElementById('oglasi-lista');
            container.innerHTML = "";
            const data = snapshot.val();
            if (data) {
                Object.values(data).forEach(o => {
                    container.innerHTML += `<div class="card"><img src="${o.slika}"><h3>${o.naslov}</h3><p>${o.cena} €</p></div>`;
                });
            }
        });
    </script>
</body>
</html>
