<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <title>AVTO PAZAR - Огласник</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background-color: #ffffff; padding: 20px; }
        
        header { display: flex; align-items: center; border-bottom: 2px solid #ddd; padding-bottom: 20px; margin-bottom: 30px; }
        .logo-img { width: 200px; }

        .main-content { max-width: 900px; }
        
        #admin-panel { display: none; border: 2px dashed #ff4500; padding: 20px; background: #fff; margin-bottom: 30px; }
        input { display: block; margin: 10px 0; padding: 10px; width: 100%; }
        button { background: #ff4500; color: white; padding: 10px 20px; border: none; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 5px; }

        #oglasi-lista { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: #fff; border: 1px solid #ddd; padding: 15px; text-align: center; position: relative; }
        .card img { width: 100%; height: 200px; object-fit: cover; margin-bottom: 10px; cursor: pointer; }
        .card h3 { font-size: 18px; margin: 5px 0; word-wrap: break-word; }
        .delete-check { display: none; position: absolute; top: 10px; right: 10px; transform: scale(1.5); }
    </style>
</head>
<body>

    <header>
        <img src="Gemini_Generated_Image_xwunxmxwunxmxwun.png" class="logo-img" alt="AVTO PAZAR">
    </header>

    <div class="main-content">
        <div id="admin-panel">
            <h3>АДМИН - Додади оглас</h3>
            <input type="text" id="naslov" placeholder="Наслов">
            <input type="text" id="cena" placeholder="Цена">
            <input type="text" id="slikaLink" placeholder="Линк од слика">
            <button onclick="dodadiLinkVoLista()">Додади слика (макс 10)</button>
            <p id="brojacSlik">Слики додадени: 0/10</p>
            <button onclick="objaviOglasFinal()" style="background:green">Објави оглас</button>
            <button onclick="izbrishiOglasi()" style="background:red">ИЗБРИШИ СЕЛЕКТИРАНИ</button>
        </div>
        <div id="oglasi-lista"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA5HhfVOsOMUCCNF7wNI4MlVrJD0BFtxMU",
            authDomain: "avtopazar-1d78e.firebaseapp.com",
            databaseURL: "https://avtopazar-1d78e-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "avtopazar-1d78e",
            storageBucket: "avtopazar-1d78e.firebasestorage.app",
            messagingSenderId: "105094237903",
            appId: "1:105094237903:web:02287d90b7e3c0ebc431ba"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let privremenaListaSliki = [];

        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                if (prompt("Лозинка:") === "avtopazar55/") {
                    document.getElementById('admin-panel').style.display = "block";
                    document.querySelectorAll('.delete-check').forEach(c => c.style.display = "block");
                }
            }
        });

        window.dodadiLinkVoLista = () => {
            let link = document.getElementById('slikaLink').value;
            if (link && privremenaListaSliki.length < 10) {
                privremenaListaSliki.push(link);
                document.getElementById('slikaLink').value = "";
                document.getElementById('brojacSlik').innerText = `Слики додадени: ${privremenaListaSliki.length}/10`;
            } else {
                alert("Максимум 10 слики или празен линк!");
            }
        };

        window.objaviOglasFinal = () => {
            const naslov = document.getElementById('naslov').value;
            const cena = document.getElementById('cena').value;
            if(!naslov || !cena || privremenaListaSliki.length === 0) return alert("Пополни се!");

            push(ref(db, 'oglasi'), { naslov, cena, slike: privremenaListaSliki });
            alert("Огласот е објавен!");
            privremenaListaSliki = [];
            document.getElementById('brojacSlik').innerText = "Слики додадени: 0/10";
            document.getElementById('naslov').value = "";
            document.getElementById('cena').value = "";
        };

        window.izbrishiOglasi = () => {
            document.querySelectorAll('.delete-check:checked').forEach(cb => {
                remove(ref(db, 'oglasi/' + cb.dataset.id));
            });
        };

        onValue(ref(db, 'oglasi'), (snapshot) => {
            const container = document.getElementById('oglasi-lista');
            container.innerHTML = "";
            const data = snapshot.val();
            if (data) {
                Object.entries(data).forEach(([id, o]) => {
                    container.innerHTML += `
                        <div class="card">
                            <input type="checkbox" class="delete-check" data-id="${id}">
                            <img src="${o.slike[0]}" onclick="window.open('about:blank').document.write('<h1>${o.naslov}</h1><p>Цена: ${o.cena}€</p>'+o.slike.map(s=>'<img src=\\''+s+'\\' width=\\'500\\'>').join('<br>'))">
                            <h3>${o.naslov}</h3>
                            <p>ЦЕНА: ${o.cena} €</p>
                        </div>`;
                });
            }
        });
    </script>
</body>
</html>
