<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <title>AVTO PAZAR</title>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; text-align: center; }
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 20px; 
            padding: 20px; 
            max-width: 1000px; 
            margin: auto; 
        }
        .card { 
            border: 2px solid #ff4500; 
            padding: 15px; 
            border-radius: 10px; 
            background: #1e1e1e; 
        }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; }
        h1 { color: #ff4500; }
    </style>
</head>
<body>

    <h1>AVTO PAZAR</h1>
    <p>Квалитетни автоделови од мојата гаража</p>
    <a href="index.html" style="color: #ff4500;">← Назад на Почетна</a>

    <div class="grid-container">
        <!-- Оглас 1 -->
        <div class="card">
            <img src="slika1.jpg" alt="Дел">
            <h3>Вентилатор - Hyundai Santa Fe</h3>
            <p>Цена: 50 евра</p>
        </div>
        <!-- Оглас 2 -->
        <div class="card">
            <img src="slika2.jpg" alt="Дел">
            <h3>Алтернатор - Опел Астра G</h3>
            <p>Цена: 45 евра</p>
        </div>
        <!-- Оглас 3 -->
        <div class="card">
            <img src="slika3.jpg" alt="Дел">
            <h3>Задна кочница - Голф 5</h3>
            <p>Цена: 30 евра</p>
        </div>
        <!-- Можеш да додаваш уште вакви card блокови -->
    </div>

</body>
</html>
