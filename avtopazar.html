<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <title>AVTO PAZAR - Админ</title>
    <style>
        body { background-color: #121212; color: white; font-family: Arial, sans-serif; padding: 20px; text-align: center; }
        .admin-box { border: 2px solid #ff4500; padding: 20px; border-radius: 10px; margin-bottom: 30px; background: #1a1a1a; }
        input { margin: 5px; padding: 10px; width: 250px; border-radius: 5px; border: none; }
        button { background:#ff4500; border:none; padding:10px 20px; color:white; cursor:pointer; font-weight:bold; border-radius: 5px; margin: 5px; }
        .delete-btn { background: #8b0000; }
        
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 1100px; margin: auto; }
        
        .card { 
            border: 2px solid #ff4500; 
            padding: 10px; 
            border-radius: 10px; 
            background: #1a1a1a; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            position: relative;
            word-wrap: break-word; /* Ова овозможува прекршување на долг текст */
            overflow: hidden; 
        }
        
        .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 5px; margin-bottom: 10px; display: block; }
        
        .info { width: 100%; text-align: left; overflow-wrap: break-word; }
        
        .select-checkbox { position: absolute; top: 10px; right: 10px; transform: scale(1.5); cursor: pointer; }
    </style>
</head>
<body>

    <h1>AVTO PAZAR</h1>

    <div class="admin-box">
        <h3>Додади нов оглас</h3>
        <input type="text" id="naslov" placeholder="Наслов">
        <input type="text" id="cena" placeholder="Цена">
        <input type="file" id="slikaFile" accept="image/*">
        <button onclick="dodadiOglas()">Додади</button>
        <button class="delete-btn" onclick="brisiSelektirani()">Избриши селектирани</button>
    </div>

    <div class="grid-container" id="oglasi-lista"></div>

    <script>
        function prikaziOglasi() {
            let oglasi = JSON.parse(localStorage.getItem('mojiOglasi')) || [];
            let container = document.getElementById('oglasi-lista');
            container.innerHTML = "";
            oglasi.forEach((o, index) => {
                container.innerHTML += `
                    <div class="card">
                        <input type="checkbox" class="select-checkbox" data-index="${index}">
                        <img src="${o.slika}" alt="Слика">
                        <div class="info">
                            <h3>${o.naslov}</h3>
                            <p>Цена: <b>${o.cena}</b></p>
                        </div>
                    </div>`;
            });
        }

        function dodadiOglas() {
            const fileInput = document.getElementById('slikaFile');
            const file = fileInput.files[0];
            
            if (!file) { alert("Ве молам изберете слика!"); return; }

            const reader = new FileReader();
            reader.onload = function(e) {
                let novi = {
                    naslov: document.getElementById('naslov').value,
                    cena: document.getElementById('cena').value,
                    slika: e.target.result
                };
                let oglasi = JSON.parse(localStorage.getItem('mojiOglasi')) || [];
                oglasi.push(novi);
                localStorage.setItem('mojiOglasi', JSON.stringify(oglasi));
                prikaziOglasi();
            };
            reader.readAsDataURL(file);
        }

        function brisiSelektirani() {
            let checkboxes = document.querySelectorAll('.select-checkbox:checked');
            let oglasi = JSON.parse(localStorage.getItem('mojiOglasi')) || [];
            let indexiZaBrisenje = Array.from(checkboxes).map(cb => parseInt(cb.getAttribute('data-index')));
            
            // Бришење наназад за да не се променат индексите
            indexiZaBrisenje.sort((a, b) => b - a);
            indexiZaBrisenje.forEach(index => oglasi.splice(index, 1));
            
            localStorage.setItem('mojiOglasi', JSON.stringify(oglasi));
            prikaziOglasi();
        }

        prikaziOglasi();
    </script>
</body>
</html>
