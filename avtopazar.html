<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <title>AVTO PAZAR - Огласник</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background-color: #ffffff; padding: 20px; }
        /* Промена: flex-direction: column за да бидат еден под друг и центрирани */
        header { display: flex; flex-direction: column; align-items: center; border-bottom: 2px solid #ddd; padding-bottom: 20px; margin-bottom: 30px; gap: 20px; }
        .logo-img { width: 200px; }
        .main-content { max-width: 1100px; margin: 0 auto; }
        
        /* МЕНИ СТИЛОВИ */
        .nav-menu { margin-bottom: 30px; border-bottom: 1px solid #ccc; padding-bottom: 15px; }
        .nav-link { cursor: pointer; color: #555; text-decoration: none; font-weight: bold; margin-right: 40px; transition: color 0.3s; font-size: 18px; }
        .nav-link:hover { color: #000000; }

        #admin-panel { display: none; border: 2px dashed #ff4500; padding: 20px; background: #fff; margin-bottom: 30px; }
        input { display: block; margin: 10px 0; padding: 10px; width: 100%; }
        button { background: #ff4500; color: white; padding: 10px 20px; border: none; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 5px; }

        /* ФИКСЕН РАСПОРЕД 4 КОЛОНИ */
        #oglasi-lista { display: grid; grid-template-columns: repeat(4, 250px); justify-content: center; gap: 20px; }

        /* ФИКСНИ КАРТИЧКИ */
        .card { 
            background: #fff; border: 1px solid #ddd; padding: 15px; text-align: center; position: relative;
            width: 250px; height: 350px; display: flex; flex-direction: column; justify-content: space-between;
        }
        .card img { width: 100%; height: 180px; object-fit: cover; margin-bottom: 10px; cursor: pointer; }
        
        /* ЛИМИТИРАЊЕ НА ТЕКСТ */
        .card h3 { font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin: 10px 0; }

        .fav-link { display: inline-block; padding: 8px 15px; background-color: #c8a979; color: white; text-decoration: none; border-radius: 4px; cursor: pointer; font-size: 13px; margin-top: auto; font-weight: bold; }
        .del-link { background-color: red; }
        .delete-check { display: none; position: absolute; top: 10px; right: 10px; transform: scale(1.5); }
        
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        #big-img { max-width: 80%; max-height: 60%; }
        .nav-btns { margin-top: 20px; }
        .nav-btns button { width: auto; padding: 10px 30px; margin: 0 10px; }
    </style>
</head>
<body>

    <header>
        <img src="Gemini_Generated_Image_xwunxmxwunxmxwun.png" class="logo-img" alt="AVTO PAZAR">
        <img src="1.png" width="728" height="90" alt="Banner">
    </header>

    <div class="main-content">
        <nav class="nav-menu">
            <a class="nav-link" onclick="location.reload()">ПОЧЕТНА</a>
            <a class="nav-link" onclick="prikazhiOmileni()">ОМИЛЕНИ</a>
        </nav>

        <div id="admin-panel">
            <h3>АДМИН - Додади оглас</h3>
            <input type="text" id="naslov" placeholder="Наслов" maxlength="30">
            <input type="text" id="cena" placeholder="Цена" maxlength="15">
            <input type="text" id="slikaLink" placeholder="Линк од слика">
            <button onclick="dodadiLinkVoLista()">Додади слика (макс 10)</button>
            <p id="brojacSlik">Слики додадени: 0/10</p>
            <button onclick="objaviOglasFinal()" style="background:green">Објави оглас</button>
            <button onclick="izbrishiOglasi()" style="background:red">ИЗБРИШИ СЕЛЕКТИРАНИ</button>
        </div>
        <div id="oglasi-lista"></div>
    </div>

    <div id="modal" onclick="this.style.display='none'">
        <img id="big-img" src="" onclick="event.stopPropagation()">
        <div class="nav-btns">
            <button onclick="event.stopPropagation(); promeniSlika(-1)">⬅ Претходна</button>
            <button onclick="event.stopPropagation(); promeniSlika(1)">Следна ➡</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const db = getDatabase(initializeApp({
            apiKey: "AIzaSyA5HhfVOsOMUCCNF7wNI4MlVrJD0BFtxMU",
            authDomain: "avtopazar-1d78e.firebaseapp.com",
            databaseURL: "https://avtopazar-1d78e-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "avtopazar-1d78e",
            storageBucket: "avtopazar-1d78e.firebasestorage.app",
            messagingSenderId: "105094237903",
            appId: "1:105094237903:web:02287d90b7e3c0ebc431ba"
        }));
        
        let privremenaListaSliki = [], siteOglasi = {}, trenutniSliki = [], indeks = 0;

        window.otvoriGalerija = (sliki) => { trenutniSliki = sliki; indeks = 0; document.getElementById('big-img').src = trenutniSliki[indeks]; document.getElementById('modal').style.display = 'flex'; };
        window.promeniSlika = (smer) => { indeks = (indeks + smer + trenutniSliki.length) % trenutniSliki.length; document.getElementById('big-img').src = trenutniSliki[indeks]; };
        window.dodadiVoOmileni = (id) => { let o = JSON.parse(localStorage.getItem('omileni') || "[]"); if(!o.includes(id)) { o.push(id); localStorage.setItem('omileni', JSON.stringify(o)); alert("Зачувано!"); } };
        window.izbrishiOdOmileni = (id) => { let o = JSON.parse(localStorage.getItem('omileni') || "[]"); o = o.filter(i => i !== id); localStorage.setItem('omileni', JSON.stringify(o)); prikazhiOmileni(); };
        window.prikazhiOmileni = () => { let ids = JSON.parse(localStorage.getItem('omileni') || "[]"); render(siteOglasi, ids, true); };

        function render(data, filterIds = null, isFav = false) {
            const container = document.getElementById('oglasi-lista');
            container.innerHTML = "";
            Object.entries(data || {}).forEach(([id, o]) => {
                if(filterIds && !filterIds.includes(id)) return;
                container.innerHTML += `
                    <div class="card">
                        <input type="checkbox" class="delete-check" data-id="${id}">
                        <img src="${o.slike[0]}" onclick="otvoriGalerija(${JSON.stringify(o.slike).replace(/"/g, "'")})">
                        <h3>${o.naslov}</h3>
                        <p>ЦЕНА: ${o.cena} ден.</p>
                        ${isFav ? `<a class="fav-link del-link" onclick="izbrishiOdOmileni('${id}')">ИЗБРИШИ</a>` : 
                                  `<a class="fav-link" onclick="dodadiVoOmileni('${id}')">ОМИЛЕНИ</a>`}
                    </div>`;
            });
            if(document.getElementById('admin-panel').style.display === "block") document.querySelectorAll('.delete-check').forEach(c => c.style.display = "block");
        }

        document.addEventListener('keydown', (e) => { if (e.ctrlKey && e.key === 'Enter') { if (prompt("Лозинка:") === "avtopazar55/") { document.getElementById('admin-panel').style.display = "block"; document.querySelectorAll('.delete-check').forEach(c => c.style.display = "block"); } } });
        window.dodadiLinkVoLista = () => { let link = document.getElementById('slikaLink').value; if (link && privremenaListaSliki.length < 10) { privremenaListaSliki.push(link); document.getElementById('slikaLink').value = ""; document.getElementById('brojacSlik').innerText = `Слики: ${privremenaListaSliki.length}/10`; } };
        window.objaviOglasFinal = () => { const naslov = document.getElementById('naslov').value, cena = document.getElementById('cena').value; if(!naslov || !cena || privremenaListaSliki.length === 0) return alert("Пополни се!"); push(ref(db, 'oglasi'), { naslov, cena, slike: privremenaListaSliki }); alert("Објавено!"); privremenaListaSliki = []; document.getElementById('naslov').value = ""; document.getElementById('cena').value = ""; };
        window.izbrishiOglasi = () => { document.querySelectorAll('.delete-check:checked').forEach(cb => { remove(ref(db, 'oglasi/' + cb.dataset.id)); }); };
        
        onValue(ref(db, 'oglasi'), (snapshot) => { siteOglasi = snapshot.val() || {}; render(siteOglasi); });
    </script>
</body>
</html>
