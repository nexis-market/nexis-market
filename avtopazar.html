<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avto Pazar | Nexis Market</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #121214; color: #ffffff; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .container { max-width: 1000px; width: 100%; }
        header { text-align: center; margin-bottom: 40px; border-bottom: 2px solid #ff5000; padding-bottom: 20px; }
        h1 { color: #ff5000; font-size: 2.5rem; }

        /* Каталог мрежа */
        .catalog { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        
        .product-item { background: #1a1a1e; padding: 20px; border-radius: 12px; border: 1px solid #2c2c35; transition: 0.3s; }
        .product-item:hover { border-color: #ff5000; }
        .product-item img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; cursor: pointer; }
        .product-item h3 { margin: 15px 0; }

        /* Модален прозорец (Галерија) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; overflow: auto; }
        .modal-content { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; padding: 50px; }
        .close { position: absolute; top: 20px; right: 30px; font-size: 50px; color: white; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>AVTO PAZAR</h1>
        <p>Квалитетни автоделови од мојата гаража</p>
        <a href="index.html" style="color: #ff5000; text-decoration: none; display: block; margin-top: 10px;">← Назад на Почетна</a>
    </header>

    <div class="catalog">
        <!-- Вентилатор Производ -->
        <div class="product-item">
            <img src="59d94c4f-c3cb-4e3c-8caf-0be6f33aec4a.jpg" onclick="openModal('modal-ventilator')" alt="Вентилатор">
            <h3>Вентилатор за Hyundai Santa Fe - 50 евра</h3>
        </div>
    </div>
</div>

<!-- Модален прозорец -->
<div id="modal-ventilator" class="modal">
    <span class="close" onclick="closeModal('modal-ventilator')">&times;</span>
    <div class="modal-content">
        <img src="59d94c4f-c3cb-4e3c-8caf-0be6f33aec4a.jpg">
        <img src="75b4523f-c12e-41ec-a206-0d0368b36666.jpg">
        <!-- Овде додавај уште слики како овие две -->
    </div>
</div>

<script>
    function openModal(id) { document.getElementById(id).style.display = "block"; }
    function closeModal(id) { document.getElementById(id).style.display = "none"; }
</script>

</body>
</html>
