<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <title>AVTO PAZAR - Админ</title>
    <style>
        body { background-color: #121212; color: white; font-family: Arial; padding: 20px; text-align: center; }
        .admin-box { border: 2px solid #ff4500; padding: 20px; border-radius: 10px; margin-bottom: 30px; }
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .card { border: 2px solid #ff4500; padding: 15px; border-radius: 15px; background: #1a1a1a; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        input { margin: 5px; padding: 10px; width: 250px; }
    </style>
</head>
<body>

    <h1>AVTO PAZAR</h1>

    <div class="admin-box">
        <h3>Додади нов оглас</h3>
        <input type="text" id="naslov" placeholder="Наслов">
        <input type="text" id="cena" placeholder="Цена">
        <input type="text" id="slika" placeholder="Линк од слика (URL)">
        <button onclick="dodadiOglas()" style="background:#ff4500; border:none; padding:10px; color:white; cursor:pointer;">Додади</button>
    </div>

    <div class="grid-container" id="oglasi-lista"></div>

    <script>
        // Функција за прикажување
        function prikaziOglasi() {
            let oglasi = JSON.parse(localStorage.getItem('mojiOglasi')) || [];
            let container = document.getElementById('oglasi-lista');
            container.innerHTML = "";
            oglasi.forEach((o, index) => {
                container.innerHTML += `<div class="card"><img src="${o.slika}"><p>${o.naslov}</p><b>${o.cena}</b></div>`;
            });
        }

        // Функција за додавање
        function dodadiOglas() {
            let novi = {
                naslov: document.getElementById('naslov').value,
                cena: document.getElementById('cena').value,
                slika: document.getElementById('slika').value
            };
            let oglasi = JSON.parse(localStorage.getItem('mojiOglasi')) || [];
            oglasi.push(novi);
            localStorage.setItem('mojiOglasi', JSON.stringify(oglasi));
            prikaziOglasi();
        }

        prikaziOglasi();
    </script>
</body>
</html>
