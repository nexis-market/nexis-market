<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <title>AVTO PAZAR - Јавен</title>
    <style>
        body { background-color: #121212; color: white; font-family: Arial, sans-serif; padding: 20px; text-align: center; }
        
        /* Изглед на коцките */
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 1100px; margin: auto; }
        .card { 
            border: 2px solid #ff4500; 
            padding: 10px; 
            border-radius: 10px; 
            background: #1a1a1a; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            word-wrap: break-word; 
        }
        .card img { 
            width: 100%; 
            height: 300px; 
            object-fit: cover; 
            object-position: center;
            border-radius: 5px; 
            margin-bottom: 10px; 
        }
        .info { width: 100%; text-align: left; }
    </style>
</head>
<body>

    <h1>AVTO PAZAR</h1>
    <p>Најдобра понуда на автоделови</p>

    <div class="grid-container" id="oglasi-lista">
        </div>

    <script>
        // Оваа функција ги влече податоците од data.json
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('oglasi-lista');
                container.innerHTML = "";
                data.forEach((o) => {
                    container.innerHTML += `
                        <div class="card">
                            <img src="${o.slika}" alt="Дел">
                            <div class="info">
                                <h3>${o.naslov}</h3>
                                <p>Цена: <b>${o.cena}</b></p>
                            </div>
                        </div>`;
                });
            })
            .catch(error => {
                console.error('Грешка при вчитување на data.json:', error);
                document.getElementById('oglasi-lista').innerHTML = "<p>Сеуште нема огласи.</p>";
            });
    </script>
</body>
</html>
