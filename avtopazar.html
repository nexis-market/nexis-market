<!DOCTYPE html>
<html lang="mk">
<head>
    <style>
        /* Lightbox стил - главниот интерфејс */
        #product-view { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:1000; padding: 50px; }
        #main-img { width: 100%; height: 500px; object-fit: contain; margin-bottom: 20px; }
        .thumb-bar { display: flex; gap: 10px; justify-content: center; }
        .thumb { width: 80px; height: 80px; object-fit: cover; cursor: pointer; border: 2px solid #555; }
        .thumb:hover { border-color: #ff4500; }
    </style>
</head>
<body>

    <div id="product-view">
        <button onclick="document.getElementById('product-view').style.display='none'" style="float:right">Затвори</button>
        <img id="main-img" src="">
        <div class="thumb-bar" id="thumbs"></div>
    </div>

    <input type="file" id="slikaFile" multiple accept="image/*">
    
    <script>
        // Кога кликаш на огласот, ја повикуваш оваа функција:
        function openAmazonView(images) {
            document.getElementById('product-view').style.display = 'block';
            document.getElementById('main-img').src = images[0]; // Првата е главна
            
            let thumbContainer = document.getElementById('thumbs');
            thumbContainer.innerHTML = "";
            images.forEach(imgSrc => {
                let img = document.createElement('img');
                img.src = imgSrc;
                img.className = 'thumb';
                img.onclick = () => document.getElementById('main-img').src = imgSrc;
                thumbContainer.appendChild(img);
            });
        }
    </script>
</body>
</html>
