<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <title>AVTO PAZAR - Огласник</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background-color: #ffffff; padding: 20px; }
        
        header { display: flex; align-items: center; border-bottom: 2px solid #ddd; padding-bottom: 20px; margin-bottom: 30px; }
        .logo-img { width: 200px; }

        .main-content { max-width: 900px; } /* Ова е твојата граница */
        
        #admin-panel { display: none; border: 2px dashed #ff4500; padding: 20px; background: #fff; margin-bottom: 30px; }
        #oglasi-lista { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        
        .card { background: #fff; border: 1px solid #ddd; padding: 15px; text-align: center; position: relative; }
        .card img { width: 100%; height: 200px; object-fit: cover; cursor: pointer; }
        
        /* Чекбокс за бришење (се крие кога не е админ) */
        .delete-checkbox { position: absolute; top: 10px; right: 10px; display: none; transform: scale(1.5); }
    </style>
</head>
<body>

    <header>
        <img src="Gemini_Generated_Image_xwunxmxwunxmxwun.png" class="logo-img" alt="AVTO PAZAR">
    </header>

    <div class="main-content">
        <div id="admin-panel">
            <h3>АДМИН</h3>
            <input type="text" id="naslov" placeholder="Наслов">
            <input type="text" id="cena" placeholder="Цена">
            <input type="file" id="slikaUpload" multiple accept="image/*">
            <button onclick="dodadiOglas()" style="background:green">Објави</button>
            <button onclick="izbrishiSelektirani()" style="background:red">ИЗБРИШИ СЕЛЕКТИРАНИ</button>
        </div>
        <div id="oglasi-lista"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { /* Твојот конфиг */ };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Логика за админ
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                if (prompt("Лозинка:") === "avtopazar55/") {
                    document.getElementById('admin-panel').style.display = "block";
                    document.querySelectorAll('.delete-checkbox').forEach(el => el.style.display = "block");
                }
            }
        });

        window.dodadiOglas = async () => {
            const files = document.getElementById('slikaUpload').files;
            let slikeBase64 = [];
            for(let file of files) {
                let reader = await new Promise(r => { let fr = new FileReader(); fr.onload = () => r(fr.result); fr.readAsDataURL(file); });
                slikeBase64.push(reader);
            }
            push(ref(db, 'oglasi'), { 
                naslov: document.getElementById('naslov').value, 
                cena: document.getElementById('cena').value, 
                slike: slikeBase64 
            });
            alert("Објавено!");
        };

        window.izbrishiSelektirani = () => {
            document.querySelectorAll('.delete-checkbox:checked').forEach(cb => {
                remove(ref(db, 'oglasi/' + cb.dataset.id));
            });
        };

        onValue(ref(db, 'oglasi'), (snapshot) => {
            const container = document.getElementById('oglasi-lista');
            container.innerHTML = "";
            const data = snapshot.val();
            if (data) {
                Object.entries(data).forEach(([id, o]) => {
                    container.innerHTML += `
                        <div class="card">
                            <input type="checkbox" class="delete-checkbox" data-id="${id}">
                            <img src="${o.slike[0]}" onclick="otvoriDetali('${id}')">
                            <h3>${o.naslov}</h3>
                            <p>ЦЕНА: ${o.cena} €</p>
                        </div>`;
                });
            }
        });

        window.otvoriDetali = (id) => {
            // Овде се отвара Amazon-стил прозорецот
            window.open(`detali.html?id=${id}`, '_blank', 'width=800,height=600');
        };
    </script>
</body>
</html>
