<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <title>AVTO PAZAR</title>
    <style>
        body { background-color: #121212; color: white; font-family: Arial; padding: 20px; text-align: center; }
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 1100px; margin: auto; }
        .card { border: 2px solid #ff4500; padding: 15px; border-radius: 10px; background: #1a1a1a; position: relative; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        
        /* Админ дел - скриен по дифолт */
        #admin-panel { display: none; border: 2px dashed #ff4500; padding: 20px; margin-bottom: 20px; }
        .hidden-trigger { color: #333; cursor: pointer; margin-top: 50px; }
    </style>
</head>
<body>

    <h1>AVTO PAZAR</h1>
    
    <div id="admin-panel">
        <h3>АДМИН ПАНЕЛ</h3>
        <input type="text" id="naslov" placeholder="Наслов">
        <input type="text" id="cena" placeholder="Цена">
        <input type="file" id="slikaFile" accept="image/*">
        <button onclick="dodadiOglas()">Додади</button>
        <button onclick="brisiSelektirani()" style="background:red; color:white;">Избриши</button>
    </div>

    <div class="grid-container" id="oglasi-lista"></div>

    <p class="hidden-trigger" onclick="login()">Конфигурација</p>

    <script>
        function login() {
            let email = prompt("Внеси е-маил:");
            let pass = prompt("Внеси лозинка:");
            if (email === "infodev976@gmail.com" && pass === "avtopazar55/") {
                document.getElementById('admin-panel').style.display = "block";
                alert("Добредојде, Админ!");
            } else {
                alert("Погрешни податоци!");
            }
        }

        // Функциите за додавање/бришење остануваат исти како досега
        function prikaziOglasi() {
            let oglasi = JSON.parse(localStorage.getItem('mojiOglasi')) || [];
            let container = document.getElementById('oglasi-lista');
            container.innerHTML = "";
            oglasi.forEach((o, index) => {
                container.innerHTML += `<div class="card"><img src="${o.slika}"><h3>${o.naslov}</h3><p>${o.cena}</p></div>`;
            });
        }
        
        // ... тука ги ставаш функциите dodadiOglas() и brisiSelektirani() ...
        prikaziOglasi();
    </script>
</body>
</html>
