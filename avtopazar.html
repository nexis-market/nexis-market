<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <title>AVTO PAZAR - Огласник</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background-color: #f9f9f9; padding: 20px; }
        header { border-bottom: 2px solid #ddd; padding-bottom: 20px; margin-bottom: 30px; text-align: center; }
        .logo-img { width: 300px; }

        /* Админ панел */
        #admin-panel { display: none; border: 2px dashed #ff4500; padding: 20px; background: #fff; margin-bottom: 30px; }
        input { display: block; margin: 10px 0; padding: 10px; width: 100%; max-width: 300px; }
        button { background: #ff4500; color: white; padding: 10px 20px; border: none; cursor: pointer; font-weight: bold; }

        /* Гриди за огласи */
        #oglasi-lista { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card h3 { font-size: 18px; margin: 10px 0; }
        .cena-box { background: #1a365d; color: white; padding: 10px; text-align: center; font-weight: bold; margin-bottom: 10px; }
        .btn-container { display: flex; gap: 5px; }
        .btn-kontakt { flex: 1; padding: 10px; background: #a68966; color: white; border: none; }
        .btn-omileni { flex: 1; padding: 10px; background: #fff; border: 1px solid #ccc; }
    </style>
</head>
<body>

    <header>
        <img src="Gemini_Generated_Image_xwunxmxwunxmxwun.png" class="logo-img" alt="AVTO PAZAR">
    </header>

    <div id="admin-panel">
        <h3>АДМИН - Додади оглас</h3>
        <input type="text" id="naslov" placeholder="Наслов">
        <input type="text" id="cena" placeholder="Цена">
        <input type="text" id="slikaUrl" placeholder="Линк до слика">
        <button onclick="dodadiOglas()">Објави оглас</button>
    </div>

    <div id="oglasi-lista"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA5HhfVOsOMUCCNF7wNI4MlVrJD0BFtxMU",
            authDomain: "avtopazar-1d78e.firebaseapp.com",
            databaseURL: "https://avtopazar-1d78e-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "avtopazar-1d78e",
            storageBucket: "avtopazar-1d78e.firebasestorage.app",
            messagingSenderId: "105094237903",
            appId: "1:105094237903:web:02287d90b7e3c0ebc431ba"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Лозинка
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                let p = prompt("Лозинка:");
                if (p === "avtopazar55/") document.getElementById('admin-panel').style.display = "block";
            }
        });

        window.dodadiOglas = () => {
            const naslov = document.getElementById('naslov').value;
            const cena = document.getElementById('cena').value;
            const slika = document.getElementById('slikaUrl').value;
            if(naslov && cena && slika) {
                push(ref(db, 'oglasi'), { naslov, cena, slika });
                alert("Огласот е објавен!");
            }
        };

        onValue(ref(db, 'oglasi'), (snapshot) => {
            const container = document.getElementById('oglasi-lista');
            container.innerHTML = "";
            const data = snapshot.val();
            if (data) {
                Object.values(data).forEach(o => {
                    container.innerHTML += `
                        <div class="card">
                            <img src="${o.slika}" alt="Возило">
                            <h3>${o.naslov}</h3>
                            <div class="cena-box">ЦЕНА: ${o.cena} €</div>
                            <div class="btn-container">
                                <button class="btn-kontakt">КОНТАКТ</button>
                                <button class="btn-omileni">ОМИЛЕНИ</button>
                            </div>
                        </div>`;
                });
            }
        });
    </script>
</body>
</html>
