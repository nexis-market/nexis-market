<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexis Market | Топ Зделки & Алатки</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #121214; color: #ffffff; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        header { text-align: center; margin-bottom: 40px; margin-top: 20px; }
        header h1 { font-size: 3rem; color: #ff5000; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }
        header p { color: #a4a4a8; margin-top: 5px; font-size: 1.1rem; }
        .container { max-width: 1000px; width: 100%; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; padding: 10px; }
        .card { background-color: #1a1a1e; border-radius: 12px; overflow: hidden; border: 1px solid #2c2c35; transition: transform 0.2s, border-color 0.2s; display: flex; flex-direction: column; justify-content: space-between; }
        .card:hover { transform: translateY(-5px); border-color: #ff5000; }
        .card img { width: 100%; height: 250px; object-fit: cover; cursor: pointer; }
        .card-content { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .card-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 10px; color: #ffffff; }
        .price-tag { font-size: 1.3rem; color: #ff5000; font-weight: bold; margin-bottom: 15px; }
        .btn-buy { display: block; text-align: center; background-color: #ff5000; color: white; text-decoration: none; padding: 12px; border-radius: 8px; font-weight: bold; transition: background 0.2s; }
        .btn-buy:hover { background-color: #e04500; }
        .ad-banner { width: 100%; max-width: 728px; background: #1a1a1e; border: 1px dashed #444; text-align: center; padding: 20px; margin-bottom: 30px; border-radius: 8px; }
    </style>
</head>
<body>

    <header>
        <h1>NEXIS MARKET</h1>
        <p>Најдобрите буџетски пронајдоци, автоделови и геџети на едно место</p>
    </header>

    <!-- ТУКА ПОСЛЕ ЌЕ СТАВИШ ADSTERRA БАНЕР -->
    <div class="ad-banner">
        <p style="color: #666;">[Тука пастирај го Adsterra банерот за заработка]</p>
    </div>

    <div class="container">

        <!-- ПРОИЗВОД 1: БРИСАЧИ -->
        <div class="card">
            <a href="https://temu.to/k/e6sxnsi526h" target="_blank">
                <img src="https://img.temu.com/hdimg/s/k/afc_share_goods/649e39485b0d0be087612f0df7bc5e24.jpg" alt="Брисачи за Citroen C4">
            </a>
            <div class="card-content">
                <div class="card-title">Автомобилски брисачи за Citroen C4 MK1 (2 парчиња)</div>
                <div>
                    <div class="price-tag">422 ден.</div>
                    <a href="https://temu.to/k/e6sxnsi526h" target="_blank" class="btn-buy">Види Попуст на Temu</a>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
